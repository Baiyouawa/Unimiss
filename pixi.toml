cmd = "python Baseline/MTSCI.py --dataset italy_air_quality --mask_type mix --missing_rate 0.2 --mar_ratio 0.2"
[tasks.ratio-mtsci-italy-mar80]
cmd = "python Baseline/MTSCI.py --dataset italy_air_quality --mask_type mix --missing_rate 0.2 --mar_ratio 0.8"

# ---- ImputeFormer ratio sweep ----
[tasks.ratio-imputeformer-ett-mar20]
cmd = "python Baseline/ImputeFormer.py --dataset electricity_transformer_temperature --mask_type mix --missing_rate 0.2 --mar_ratio 0.2"
[tasks.ratio-imputeformer-ett-mar80]
cmd = "python Baseline/ImputeFormer.py --dataset electricity_transformer_temperature --mask_type mix --missing_rate 0.2 --mar_ratio 0.8"
[tasks.ratio-imputeformer-italy-mar20]
cmd = "python Baseline/ImputeFormer.py --dataset italy_air_quality --mask_type mix --missing_rate 0.2 --mar_ratio 0.2"
[tasks.ratio-imputeformer-italy-mar80]
cmd = "python Baseline/ImputeFormer.py --dataset italy_air_quality --mask_type mix --missing_rate 0.2 --mar_ratio 0.8"

# ---- Ours ratio visualization (gate routing under different compositions) ----
[tasks.ratio-vis-ours-ett-mar20]
cmd = "python Ours/run.py --dataset electricity_transformer_temperature --mask_type mix --missing_rate 0.2 --mar_ratio 0.2 --experiment_group visualization --run_name vis_ratio_mar20"
[tasks.ratio-vis-ours-ett-mar80]
cmd = "python Ours/run.py --dataset electricity_transformer_temperature --mask_type mix --missing_rate 0.2 --mar_ratio 0.8 --experiment_group visualization --run_name vis_ratio_mar80"

# ---- Batch: all ratio experiments ----
[tasks.batch-ratio]
cmd = "echo '[batch] Mix ratio sensitivity experiments complete'"
description = "MAR:MNAR ratio sensitivity: Ours + FGTI + MTSCI + ImputeFormer × {20:80, 80:20} × both datasets"
depends-on = [
    "ratio-ours-ett-mar20", "ratio-ours-ett-mar80",
    "ratio-ours-italy-mar20", "ratio-ours-italy-mar80",
    "ratio-fgti-ett-mar20", "ratio-fgti-ett-mar80",
    "ratio-fgti-italy-mar20", "ratio-fgti-italy-mar80",
    "ratio-mtsci-ett-mar20", "ratio-mtsci-ett-mar80",
    "ratio-mtsci-italy-mar20", "ratio-mtsci-italy-mar80",
    "ratio-imputeformer-ett-mar20", "ratio-imputeformer-ett-mar80",
    "ratio-imputeformer-italy-mar20", "ratio-imputeformer-italy-mar80",
    "ratio-vis-ours-ett-mar20", "ratio-vis-ours-ett-mar80",
]

# --- Complete paper experiment suite ---
[tasks.batch-all]
cmd = "echo '[batch] ALL experiments complete'"
description = "Run the entire CIKM 2026 experiment suite"
depends-on = [
    "batch-main-table",
    "batch-supplementary-ett",
    "batch-supplementary-italy",
    "batch-ablation",
    "batch-hyperparameter",
    "batch-scaling",
    "batch-ratio",
    "vis-ett-mix-20",
    "vis-italy-mix-20",
    "count-ours-params",
]

