[workspace]
# 1. 将 [project] 改为 [workspace]
name = "nuwats"
version = "0.1.0"
platforms = ["linux-64"]
channels = [
    # 使用官方 conda-forge 源，避免镜像证书问题
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge"
]

[tasks]
# CIKM 2026 main experiment matrix
# Baselines: Mean, BRITS, SPIN, TimesNet, SAITS, ImputeFormer, MTSCI, FGTI
# Ours: explicit OO/OM/MM + Stage-II mechanism-aware gate
# Datasets: ETT and IAQ
# Mechanisms: ETT -> mar/mnar_t/mix, IAQ -> mar/mnar_x/mix
# Missing rates: 0.2 / 0.3 / 0.4

[tasks.run-brits]
cmd = "python Baseline/Brits.py"
description = "Run BRITS baseline"

[tasks.run-mean]
cmd = "python Baseline/Mean.py"
description = "Run mean-imputation baseline"

[tasks.run-timesnet]
cmd = "python Baseline/Timesnet.py"
description = "Run TimesNet baseline"

[tasks.run-saits]
cmd = "python Baseline/SAITS.py"
